# Render deployment configuration — https://render.com/docs/render-yaml
# One Web Service: serves the Vite frontend AND all /api/* routes via Express.

services:
  - type: web
    name: hashkey-paylink
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production

      # ── Frontend (baked in at build time by Vite) ──────────────────────────
      - key: VITE_WALLETCONNECT_PROJECT_ID
        sync: false                   # set manually in Render dashboard
      - key: VITE_FACTORY_V2
        value: "0x2268B8aad138a550FEf46C621756fEb26b587F78"
      - key: VITE_RPC_URL
        sync: false                   # your Alchemy frontend RPC key
      - key: VITE_BASE_PAYMASTER_URL
        value: "/api/base-paymaster"   # optional Coinbase/CDP Base paymaster proxy
      - key: VITE_CIRCLE_PAYMASTER_ENABLED
        value: "false"                 # enable only after Circle AA payment path is wired
      - key: VITE_CIRCLE_BUNDLER_URL_BASE
        value: "https://public.pimlico.io/v2/8453/rpc"
      - key: VITE_CIRCLE_BUNDLER_URL_ARB
        value: "https://public.pimlico.io/v2/42161/rpc"
      - key: VITE_CIRCLE_PAYMASTER_V08_BASE
        value: "0x0578cFB241215b77442a541325d6A4E6dFE700Ec"
      - key: VITE_CIRCLE_PAYMASTER_V08_ARB
        value: "0x0578cFB241215b77442a541325d6A4E6dFE700Ec"
      - key: VITE_CLIENT_KEY
        sync: false                   # Circle Modular Wallet public client key
      - key: VITE_CLIENT_URL
        sync: false                   # Circle Modular Wallet client URL
      - key: VITE_CIRCLE_EVM_EMAIL_ENABLED
        value: "true"                 # Base/Arbitrum Circle User-Controlled SCA email wallet payments
      - key: VITE_CIRCLE_USER_WALLET_APP_ID
        sync: false                   # Circle User-Controlled Wallet Web SDK app id
      - key: STREAM_FACTORY_ADDRESS
        value: "0x1C20e33B6d82E27234f417EeD613a88b9640638f"
      - key: VITE_STREAM_FACTORY_ADDRESS
        value: "0x1C20e33B6d82E27234f417EeD613a88b9640638f"
      - key: BASE_GAS_RECOVERY_USDC
        value: "0.01"
      - key: ARBITRUM_GAS_RECOVERY_USDC
        value: "0.03"
      - key: ARC_GAS_RECOVERY_USDC
        value: "0"
      - key: CIRCLE_API_KEY
        sync: false                   # Circle server API key for wallet OTP/signing
      - key: CIRCLE_BASE_URL
        value: "https://api.circle.com"

      # ── V2 relayer (api/relay-v2.ts) ──────────────────────────────────────
      - key: PAYLINK_FACTORY_V2
        value: "0x2268B8aad138a550FEf46C621756fEb26b587F78"
      - key: CDP_PAYMASTER_URL
        sync: false                   # Coinbase/CDP paymaster URL for Base sponsorship
      - key: RELAYER_PRIVATE_KEY
        sync: false                   # 0x-prefixed — ROTATE before adding here
      - key: PRIVATE_RPC_URL
        sync: false                   # Alchemy backend RPC key (high rate limit)

      # ── Arbitrum + native USDC relayer (api/relay-gho.ts + api/relay-v2.ts) ─
      - key: RELAYER_PRIVATE_KEY_ARB
        sync: false                   # Arbitrum relayer key — wallet needs ETH on Arbitrum
      - key: PRIVATE_RPC_URL_ARB
        value: "https://arb1.arbitrum.io/rpc"   # swap for Alchemy/QuickNode in prod
      - key: PAYLINK_FACTORY_V2_ARB
        value: "0x2268B8aad138a550FEf46C621756fEb26b587F78"
      - key: VITE_FACTORY_V2_ARB
        value: "0x2268B8aad138a550FEf46C621756fEb26b587F78"

      # ── V1 sweep keeper (api/sweep.ts + api/sweep-keeper.ts) ──────────────
      - key: KEEPER_PRIVATE_KEY
        sync: false                   # 0x-prefixed keeper wallet private key
      - key: CRON_SECRET
        sync: false                   # random string; authenticate sweep-keeper cron
      - key: FACTORY_FROM_BLOCK
        value: "45786000"             # Base block before the 0.2% router factory deployment
      - key: SOLANA_RPC_URL
        sync: false                   # Solana backend private RPC endpoint

# ── External cron (sweep-keeper) ──────────────────────────────────────────────
# Render free tier does not include cron jobs.
# Continue using cron-job.org (free) pointing to:
#   GET https://<your-render-app>.onrender.com/api/sweep-keeper
#   Header: Authorization: Bearer <CRON_SECRET>
