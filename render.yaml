# Render deployment configuration — https://render.com/docs/render-yaml
# One Web Service: serves the Vite frontend AND all /api/* routes via Express.

services:
  - type: web
    name: hashkey-paylink
    runtime: node
    plan: starter
    buildCommand: npm ci --include=dev && npm run build:source
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production

      # ── Frontend (baked in at build time by Vite) ──────────────────────────
      - key: VITE_WALLETCONNECT_PROJECT_ID
        sync: false                   # set manually in Render dashboard
      - key: VITE_AUTH_BRIDGE
        value: "hybrid"               # enables Privy-backed public PolyDesk sessions
      - key: VITE_PRIVY_APP_ID
        sync: false                   # browser-visible Privy app id
      - key: VITE_FACTORY_V2
        value: "0x2268B8aad138a550FEf46C621756fEb26b587F78"
      - key: VITE_RPC_URL
        sync: false                   # your Alchemy frontend RPC key
      - key: VITE_BASE_PAYMASTER_URL
        value: "/api/base-paymaster"   # optional Coinbase/CDP Base paymaster proxy
      - key: VITE_CIRCLE_PAYMASTER_ENABLED
        value: "false"                 # enable only after Circle AA payment path is wired
      - key: VITE_CIRCLE_BUNDLER_URL_BASE
        value: "https://public.pimlico.io/v2/8453/rpc"
      - key: VITE_CIRCLE_BUNDLER_URL_ARB
        value: "https://public.pimlico.io/v2/42161/rpc"
      - key: VITE_CIRCLE_PAYMASTER_V08_BASE
        value: "0x0578cFB241215b77442a541325d6A4E6dFE700Ec"
      - key: VITE_CIRCLE_PAYMASTER_V08_ARB
        value: "0x0578cFB241215b77442a541325d6A4E6dFE700Ec"
      - key: VITE_CLIENT_KEY
        sync: false                   # Circle Modular Wallet public client key
      - key: VITE_CLIENT_URL
        sync: false                   # Circle Modular Wallet client URL
      - key: VITE_CIRCLE_EVM_EMAIL_ENABLED
        value: "true"                 # Base/Arbitrum Circle User-Controlled SCA email wallet payments
      - key: VITE_CIRCLE_USER_WALLET_APP_ID
        sync: false                   # Circle User-Controlled Wallet Web SDK app id
      - key: VITE_CIRCLE_USER_WALLET_APP_ID_ARC_TESTNET
        sync: false                   # Circle test app id for Arc testnet StreamPay
      - key: VITE_RPC_URL_ARC
        value: "https://rpc.testnet.arc.network"
      - key: STREAM_FACTORY_ADDRESS
        value: "0xBAecf54084A0cB65b77a88cbDEf2b663Be71c61b"
      - key: VITE_STREAM_FACTORY_ADDRESS
        value: "0xBAecf54084A0cB65b77a88cbDEf2b663Be71c61b"
      - key: CHECKPOINT_FACTORY_ADDRESS
        value: "0x8eEc65a18f3b5deb0E9Fc5e1eCf8263587b02927"
      - key: VITE_CHECKPOINT_FACTORY_ADDRESS
        value: "0x8eEc65a18f3b5deb0E9Fc5e1eCf8263587b02927"
      - key: ARC_POA_CONTRACT
        value: "0x91DbDb49c8C68e5775554D42A1B5ce15C89C814B"
      - key: VITE_POA_CONTRACT
        value: "0x91DbDb49c8C68e5775554D42A1B5ce15C89C814B"
      - key: ARENA_ESCROW_FACTORY_ADDRESS
        sync: false                   # Server-side Arena escrow factory after multiplayer contract deploy
      - key: VITE_ARENA_ESCROW_FACTORY_ADDRESS
        sync: false                   # Browser-visible Arena escrow factory after deploy
      - key: ARENA_RELAYER_PRIVATE_KEY
        sync: false                   # Server-side Arena relayer key; must match deployed Arena factory relayer
      - key: BASE_GAS_RECOVERY_USDC
        value: "0.01"
      - key: ARBITRUM_GAS_RECOVERY_USDC
        value: "0.03"
      - key: ARC_GAS_RECOVERY_USDC
        value: "0"
      - key: CIRCLE_API_KEY
        sync: false                   # Circle server API key for wallet OTP/signing
      - key: CIRCLE_TEST_API_KEY
        sync: false                   # Circle TEST_API key for Arc testnet StreamPay
      - key: CIRCLE_BASE_URL
        value: "https://api.circle.com"
      - key: CIRCLE_CLI_ENABLED
        value: "true"                 # required for reader wallet login, x402 balance checks, Gateway activation, and x402 pay
      - key: DATABASE_URL
        sync: false                   # Render Postgres for durable platform storage
      - key: HASH_PAYLINK_BASE_URL
        value: "https://hashpaylink.com"
      - key: PUBLIC_APP_URL
        value: "https://hashpaylink.com"
      - key: CREATOR_ADMIN_KEY
        sync: false                   # admin review key for /creator-admin approvals
      - key: CREATOR_OFFICIAL_WALLET
        sync: false                   # official StreamPay creator wallet used for official cards
      - key: CREATOR_WORLD_CUP_NEWS_URL
        value: "https://www.fifa.com/en/tournaments/mens/worldcup/canadamexicousa2026"
      - key: CREATOR_WORLD_CUP_NEWS_PRICE_RAW
        value: "100000"
      - key: CREATOR_WORLD_CUP_SCORES_PRICE_RAW
        value: "100000"
      - key: X402_CREATOR_ACCEPT_NETWORKS
        value: "eip155:5042002"
      - key: X402_CREATOR_FACILITATOR_URL
        value: "https://gateway-api-testnet.circle.com"
      - key: CREATOR_AGENT_X402_PAY_CHAIN
        value: "ARC-TESTNET"
      - key: AGENT_WALLET_SERVICE_SECRET
        sync: false                   # server secret for agent wallet service operations
      - key: DEFAULT_AGENT_SLUG
        value: "hashpaylink-agent"
      - key: DEFAULT_AGENT_WALLET_ADDRESS
        sync: false                   # optional pinned platform reader/agent wallet address
      - key: DEFAULT_AGENT_WALLET_CHAIN
        value: "BASE"
      - key: AGENT_WALLET_GATEWAY_BALANCE_CHAIN
        value: "MATIC"
      - key: AGENT_WALLET_GATEWAY_DEPOSIT_CHAIN
        value: "BASE"
      - key: AGENT_WALLET_MAX_GATEWAY_DEPOSIT_AMOUNT
        value: "5"
      - key: PRIVY_APP_ID
        sync: false                   # server-side Privy app id; can match VITE_PRIVY_APP_ID
      - key: PRIVY_APP_SECRET
        sync: false                   # server-side Privy secret for authenticated PolyDesk APIs
      - key: HASH_PAYLINK_POLYDESK_SERVICE_TOKEN
        sync: false                   # scoped server token for PolyDesk funding checkout creation
      - key: CIRCLE_RECIPIENT_WALLET_KEY_PREFIX
        value: "circle-recipient-wallet"
      - key: RESEND_API_KEY
        sync: false                   # Resend API key for Hash PayLink transactional emails
      - key: STREAM_INVITE_FROM_EMAIL
        value: "no-reply@mail.hashpaylink.com"
      - key: STREAM_INVITE_FROM_NAME
        value: "StreamPay"
      - key: AGENTIC_STREAMING_FROM_EMAIL
        value: "no-reply@mail.hashpaylink.com"
      - key: AGENTIC_STREAMING_FROM_NAME
        value: "Hash PayLink Agent"
      - key: ALERT_FROM_EMAIL
        value: "no-reply@mail.hashpaylink.com"
      - key: ZEROSCOUT_API_URL
        value: "https://zeroscout.app"
      - key: ZEROSCOUT_INTEGRATION_SECRET
        sync: false                   # Server-only ZeroScout API key for LP operator signals
      - key: ZEROSCOUT_HASHWATCH_MEDIA_MODEL
        value: "Qwen/Qwen2.5-VL-72B-Instruct"
      - key: ZEROSCOUT_HASHWATCH_MEDIA_MODEL_CANDIDATES
        value: "Qwen/Qwen2.5-VL-72B-Instruct,qwen2.5-vl-72b-instruct,qwen-vl-max-latest,Qwen/Qwen2.5-Omni-7B"
      - key: ZEROSCOUT_HASHWATCH_MEDIA_PROVIDER
        value: "qwen-vl"
      - key: ZEROSCOUT_HASHWATCH_MEDIA_GUIDANCE_TIMEOUT_MS
        value: "90000"
      - key: OG_RPC_URL
        sync: false                   # Preferred private 0G EVM RPC endpoint; app falls back to public 0G RPC when unset
      - key: OG_INDEXER_RPC_URL
        sync: false                   # Preferred private 0G storage indexer endpoint; app falls back to public 0G indexer when unset

      # ── V2 relayer (api/relay-v2.ts) ──────────────────────────────────────
      - key: PAYLINK_FACTORY_V2
        value: "0x2268B8aad138a550FEf46C621756fEb26b587F78"
      - key: CDP_PAYMASTER_URL
        sync: false                   # Coinbase/CDP paymaster URL for Base sponsorship
      - key: RELAYER_PRIVATE_KEY
        sync: false                   # 0x-prefixed — ROTATE before adding here
      - key: PRIVATE_RPC_URL
        sync: false                   # Alchemy backend RPC key (high rate limit)
      - key: RELAYER_PRIVATE_KEY_ARC
        sync: false                   # server-side Arc relayer key; never expose with VITE_
      - key: PRIVATE_RPC_URL_ARC
        value: "https://rpc.testnet.arc.network"

      # ── Arbitrum + native USDC relayer (api/relay-arbitrum-usdc.ts + api/relay-v2.ts) ─
      - key: RELAYER_PRIVATE_KEY_ARB
        sync: false                   # Arbitrum relayer key — wallet needs ETH on Arbitrum
      - key: PRIVATE_RPC_URL_ARB
        value: "https://arb1.arbitrum.io/rpc"   # swap for Alchemy/QuickNode in prod
      - key: PAYLINK_FACTORY_V2_ARB
        value: "0x2268B8aad138a550FEf46C621756fEb26b587F78"
      - key: VITE_FACTORY_V2_ARB
        value: "0x2268B8aad138a550FEf46C621756fEb26b587F78"

      # ── V1 sweep keeper (api/sweep.ts + api/sweep-keeper.ts) ──────────────
      - key: KEEPER_PRIVATE_KEY
        sync: false                   # 0x-prefixed keeper wallet private key
      - key: CRON_SECRET
        sync: false                   # random string; authenticate sweep-keeper cron
      - key: FACTORY_FROM_BLOCK
        value: "45786000"             # Base block before the 0.2% router factory deployment
      - key: SOLANA_RPC_URL
        sync: false                   # Solana backend private RPC endpoint
      - key: RELAYER_PRIVATE_KEY_SOLANA
        sync: false                   # Solana relayer keypair; wallet needs SOL for sponsored payments
      - key: SOLANA_TREASURY
        sync: false                   # Solana treasury wallet address for fee collection
      - key: POLYMARKET_BUILDER_CODE
        sync: false                   # Polymarket builder code for bridge calls and future CLOB order attribution
      - key: POLYMARKET_BUILDER_API_KEY
        sync: false                   # Builder API key from Polymarket Builders dashboard
      - key: POLYMARKET_BUILDER_SECRET
        sync: false                   # Builder API secret from Polymarket Builders dashboard
      - key: POLYMARKET_BUILDER_PASSPHRASE
        sync: false                   # Builder API passphrase from Polymarket Builders dashboard
      - key: POLY_STREAM_PROVIDER
        value: "sportmonks"
      - key: POLY_STREAM_API_KEY
        sync: false                   # Sportmonks or API-Football key for World Cup live board
      - key: POLY_STREAM_LEAGUE_ID
        value: "732"
      - key: POLY_STREAM_SEASON
        value: "2026"
      - key: POLY_STREAM_FIXTURE_MODE
        value: "auto"
      - key: POLY_STREAM_LIMIT
        value: "64"
      - key: POLYMARKET_MATCH_URLS
        sync: false                   # JSON map from fixture/team keys to eligible World Cup Polymarket URLs

# ── External cron (sweep-keeper) ──────────────────────────────────────────────
# Render free tier does not include cron jobs.
# Continue using cron-job.org (free) pointing to:
#   GET https://<your-render-app>.onrender.com/api/sweep-keeper
#   Header: Authorization: Bearer <CRON_SECRET>
